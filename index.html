<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusheen Bank 🐾</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1 id="login-title">¿Quién eres hoy? 🐾</h1>
            
            <div id="profile-selection" class="profile-grid">
                <div class="profile-item" data-username="Franco">
                    <img src="assets/img/corona1.png" class="profile-img" alt="Perfil Franco">
                    <p>Franco</p>
                </div>
                <div class="profile-item" data-username="Jess">
                    <img src="assets/img/corona2.png" class="profile-img" alt="Perfil Jess">
                    <p>Jess</p>
                </div>
            </div>

            <!-- Ingreso de contraseña (existente) -->
            <div id="password-area" style="display: none;">
                <input type="password" id="pass-input" placeholder="Contraseña" autocomplete="off">
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="back-btn" class="btn-sec">Atrás</button>
                    <button id="login-btn" class="btn-main">Entrar 🔓</button>
                </div>
            </div>

            <!-- Crear contraseña (nuevo usuario) -->
            <div id="create-password-area" style="display: none;">
                <p>¡Es tu primera vez! 🐾</p>
                <input type="password" id="new-pass-input" placeholder="Nueva contraseña" autocomplete="off">
                <button id="register-btn" class="btn-main">Guardar y Entrar ✨</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game-screen" style="display: none;">
        <header class="game-header">
            <div class="coin-display">🪙 <span id="user-coins">0</span></div>
            <button id="logout-btn" class="btn-logout">Salir 🚪</button>
            <div class="user-badge" id="user-name-display">...</div>
        </header>

        <div class="pet-container">
            <div class="stats-grid">
                <div class="stat-item">😋 <div class="stat-bar"><div id="bar-hunger" class="stat-fill"></div></div></div>
                <div class="stat-item">💖 <div class="stat-bar"><div id="bar-happiness" class="stat-fill"></div></div></div>
            </div>
            <img src="assets/img/pusheen.gif" id="pusheen-pet" class="pusheen-main" alt="Mascota Pusheen">
        </div>

        <!-- Sección Banco -->
        <div id="bank-section" style="display: none; padding: 20px; text-align: center;">
            <h2 style="color: var(--soft-pink);">🏦 Bóveda de Pusheen</h2>
            <img src="assets/img/pusheen_bank.gif" width="150" alt="Pusheen banco">
            <div class="bank-card">
                <p>Ahorros compartidos:</p>
                <h1 id="total-bank-coins">0</h1>
            </div>
            <button id="bank-back-btn" class="btn-sec">Volver</button>
        </div>

        <!-- Navegación inferior -->
        <nav class="bottom-nav">
            <button id="play-btn">🎮 Jugar</button>
            <button id="journey-btn">🐾 Camino</button>
            <button id="bank-btn">🏦 Banco</button>
            <button id="feed-btn">🍰 Comer</button>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { showLoginScreen, showGameScreen, setupLoginHandlers, setupGameHandlers } from './assets/js/ui.js'
        import { gameState } from './assets/js/gameState.js'

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            setupLoginHandlers()
            setupGameHandlers()

            // Si hay sesión activa, mostrar juego
            if (gameState.isAuthenticated()) {
                showGameScreen()
            } else {
                showLoginScreen()
            }
        })
    </script>
</body>
</html>
