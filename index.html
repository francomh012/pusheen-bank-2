<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusheen Bank 🐾</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <img src="assets/img/pusheen.gif" alt="Pusheen" width="100">
            <h1 style="font-size: 1.5rem; margin-bottom: 10px;">Pusheen Bank</h1>
            <input type="text" id="user-input" placeholder="Usuario (Franco/Jess)">
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button id="btn-login" class="btn-main">Entrar 🐾</button>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <header class="game-header">
            <div class="coin-display">🪙 <span id="user-coins">0</span></div>
            <div class="user-badge" id="user-name-display">Franco</div>
        </header>

        <div class="pet-container">
            <div class="stats-grid">
                <div class="stat-item">😋 <div class="stat-bar"><div id="bar-hunger" class="stat-fill" style="width: 80%;"></div></div></div>
                <div class="stat-item">💖 <div class="stat-bar"><div id="bar-happiness" class="stat-fill" style="width: 90%;"></div></div></div>
            </div>
            
            <img src="assets/img/pusheen.gif" id="pusheen-pet" class="pusheen-main" alt="Mascota">
        </div>

        <nav class="bottom-nav">
            <button onclick="playWithPusheen()">🎮 Jugar</button>
            <button onclick="openJourney()">🐾 Camino</button>
            <button onclick="feedPusheen()">🍰 Comer</button>
        </nav>
    </div>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
