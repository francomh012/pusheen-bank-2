<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusheen Bank 🐾</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1 id="login-title">¿Quién eres hoy? 🐾</h1>
        
        <div id="profile-selection" class="profile-grid">
            <div class="profile-item" onclick="selectProfile('Franco')">
                <img src="assets/img/corona1.png" class="profile-img">
                <p>Franco</p>
            </div>
            <div class="profile-item" onclick="selectProfile('Jess')">
                <img src="assets/img/corona2.png" class="profile-img">
                <p>Jess</p>
            </div>
        </div>

        <div id="password-area" style="display: none;">
            <p id="selected-user-label"></p>
            <input type="password" id="pass-input" placeholder="Contraseña">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="backToProfiles()" class="btn-sec">Atrás</button>
                <button onclick="attemptLogin()" class="btn-main">Entrar 🔓</button>
            </div>
        </div>
    </div>
</div>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
