<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pusheen Bank 🐾</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1 id="login-title">¿Quién eres hoy? 🐾</h1>
            <div id="profile-selection" class="profile-grid">
                <div class="profile-item" onclick="selectProfile('Franco')">
                    <img src="assets/img/corona1.png" class="profile-img">
                    <p>Franco</p>
                </div>
                <div class="profile-item" onclick="selectProfile('Jess')">
                    <img src="assets/img/corona2.png" class="profile-img">
                    <p>Jess</p>
                </div>
            </div>
            <div id="password-area" style="display: none;">
                <input type="password" id="pass-input" placeholder="Contraseña">
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button onclick="backToProfiles()" class="btn-sec">Atrás</button>
                    <button onclick="attemptLogin()" class="btn-main">Entrar 🔓</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <header class="game-header">
            <div class="coin-display">🪙 <span id="user-coins">0</span></div>
            <button onclick="logout()" class="btn-logout">Salir 🚪</button>
            <div class="user-badge" id="user-name-display">...</div>
        </header>

        <div class="pet-container">
            <div class="stats-grid">
                <div class="stat-item">😋 <div class="stat-bar"><div id="bar-hunger" class="stat-fill" style="width: 85%;"></div></div></div>
                <div class="stat-item">💖 <div class="stat-bar"><div id="bar-happiness" class="stat-fill" style="width: 95%;"></div></div></div>
            </div>
            
            <img src="assets/img/pusheen.gif" id="pusheen-pet" class="pusheen-main" alt="Mascota">
        </div>

        <nav class="bottom-nav">
            <button onclick="alert('¡Próximamente!')">🎮 Jugar</button>
            <button onclick="alert('Abriendo camino...')">🐾 Camino</button>
            <button onclick="alert('¡Yum!')">🍰 Comer</button>
        </nav>
    </div>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
